<!DOCTYPE html>
<html lang="en" style="height:100%;margin:0;padding:0;background:#05070d;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sync Web Player · dash.js</title>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<script src="SyncController.js"></script>
<style>
  html,body{height:100%;margin:0;padding:0;overflow:hidden;background:#05070d;color:#e8edff;
    font-family:'Segoe UI',Roboto,system-ui,sans-serif;-webkit-user-select:none;user-select:none;}
  #stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;box-sizing:border-box;}
  /* Video mode: the media element fills the screen. */
  #media.video{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000;}
  /* Audio mode: the media element is not visible; a timecode UI is shown instead. */
  #media.audio{position:fixed;width:0;height:0;opacity:0;pointer-events:none;}
  .badge{position:fixed;top:16px;left:16px;display:flex;align-items:center;gap:8px;z-index:5;
    font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:#7f8db3;}
  .dot{width:10px;height:10px;border-radius:50%;background:#f0803c;box-shadow:0 0 10px #f0803c;
    transition:background .2s,box-shadow .2s;}
  .dot.live{background:#39d98a;box-shadow:0 0 12px #39d98a;}
  .dot.paused{background:#f2c94c;box-shadow:0 0 12px #f2c94c;}
  #nowplaying{display:none;flex-direction:column;align-items:center;gap:16px;padding:24px;}
  #nowplaying.show{display:flex;}
  #cover{width:96px;height:96px;border-radius:24px;background:rgba(120,140,220,.12);
    border:1px solid rgba(120,140,220,.25);display:flex;align-items:center;justify-content:center;font-size:44px;}
  #trackName{font-size:18px;font-weight:600;color:#e8edff;}
  #timecode{font-family:'SFMono-Regular',Consolas,'Roboto Mono',monospace;font-weight:700;
    font-size:clamp(28px,11vw,84px);line-height:1;letter-spacing:2px;color:#e8edff;
    text-shadow:0 0 30px rgba(80,120,255,.35);font-variant-numeric:tabular-nums;}
  #timecode .ms{color:#5f7bd6;font-size:.42em;}
  #hint{font-size:14px;color:#7f8db3;}
  #err{position:fixed;left:16px;right:16px;bottom:16px;z-index:6;display:none;
    padding:10px 14px;border-radius:10px;background:rgba(180,40,60,.18);
    border:1px solid rgba(220,80,100,.4);color:#ffd9df;font-size:13px;text-align:center;}
  #err.show{display:block;}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .pulsing{animation:pulse 1.4s ease-in-out infinite;}
</style>
</head>
<body>
<div class="badge"><span id="statusDot" class="dot"></span><span id="statusText">Waiting</span></div>

<div id="stage">
  <div id="nowplaying">
    <div id="cover">🎧</div>
    <div id="trackName">—</div>
    <div id="timecode">--:--:--<span class="ms">.---</span></div>
    <div id="hint" class="pulsing">Waiting for sync from the TV…</div>
  </div>
</div>

<script>
/**
 * Sync Web Player — plays a DASH (MPD) stream with dash.js and follows the TV
 * timeline received from the host app via `window.__hbbtvSync(payload)`.
 *
 * Used on iOS, where AVPlayer cannot play MPEG-DASH natively. The host app
 * (Universal HbbTV MediaSync) opens this page in a full-screen WebView, passes
 * the content and the selected track via query params, and feeds DVB-CSS sync
 * positions. This page keeps its own monotonic clock (corrected by each fed
 * position) and nudges the dash.js playback rate — or hard-seeks on large
 * drift — to stay locked to the TV, mirroring the native drift controller.
 *
 * Query params:
 *   mpd    — DASH manifest URL (required)
 *   mode   — 'audio' (private listening) | 'video'
 *   iso    — preferred audio/video language code (e.g. 'eng')
 *   track  — track index fallback when the language does not match
 *   role   — track role hint ('main' | 'description' | ...)
 *   volume — initial volume 0..1
 *   live   — '1' for dynamic (live) manifests
 */
(function () {
  'use strict';

  // ---- Params ---------------------------------------------------------------
  function qp(name, def) {
    var m = new RegExp('[?&]' + name + '=([^&#]*)').exec(location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : (def != null ? def : null);
  }
  var MPD_URL = qp('mpd', '');
  var MODE = (qp('mode', 'audio') === 'video') ? 'video' : 'audio';
  var TRACK_ISO = qp('iso', '');
  var TRACK_INDEX = parseInt(qp('track', '-1'), 10);
  var TRACK_ROLE = qp('role', '');
  var INIT_VOLUME = parseFloat(qp('volume', '1'));
  var IS_LIVE = qp('live', '0') === '1';
  function numberParam(name, fallback) {
    var value = parseFloat(qp(name, String(fallback)));
    return isFinite(value) ? value : fallback;
  }
  var CONTROLLER_OPTIONS = {
    emaAlpha: numberParam('emaAlpha', 0.25),
    enterBandS: numberParam('enterBandS', 0.1),
    exitBandS: numberParam('exitBandS', 0.02),
    horizonS: numberParam('horizonS', 3.0),
    deadTimeS: numberParam('deadTimeS', 0.35),
    maxRateDelta: numberParam('maxRateDelta', 0.05),
    rateEps: numberParam('rateEps', 0.002),
  };
  var SEEK_COOLDOWN_MS = numberParam('seekCooldownMs', 1500);
  var SEEK_LEAD_S = numberParam('seekLeadS', 0.4);
  var CORRECTION_INTERVAL_MS = numberParam('correctionIntervalMs', 250);
  // Dev telemetry: when `tel=1`, emit a compact sync record to the host on each
  // correction tick (throttled). The host re-logs it as a `SYNCTEL` line so the
  // tools/sync-dashboard dev tool can render the web player's sync alongside the
  // native player's. Gated by the app's SYNC_TELEMETRY flag.
  var TELEMETRY = qp('tel', '0') === '1';
  var TELEMETRY_INTERVAL_MS = 250;

  // ---- Elements -------------------------------------------------------------
  var stage = document.getElementById('stage');
  var nowplaying = document.getElementById('nowplaying');
  var elCover = document.getElementById('cover');
  var elTrackName = document.getElementById('trackName');
  var elTimecode = document.getElementById('timecode');
  var elHint = document.getElementById('hint');
  var elStatusDot = document.getElementById('statusDot');
  var elStatusText = document.getElementById('statusText');
  var elErr = document.getElementById('err');

  // For audio mode use an <audio> element (dash.js will not download video);
  // for video mode a <video> element that fills the screen.
  var media = document.createElement(MODE === 'video' ? 'video' : 'audio');
  media.id = 'media';
  media.className = MODE;
  media.setAttribute('playsinline', '');
  media.setAttribute('webkit-playsinline', '');
  if (MODE === 'video') { media.setAttribute('controls', ''); }
  media.autoplay = true;
  try { media.volume = isFinite(INIT_VOLUME) ? Math.max(0, Math.min(1, INIT_VOLUME)) : 1; } catch (e) {}
  document.body.appendChild(media);
  if (MODE === 'audio') {
    nowplaying.classList.add('show');
    elCover.textContent = TRACK_ROLE === 'description' ? '🗣️' : '🎧';
  }

  // ---- Host messaging -------------------------------------------------------
  function postToHost(obj) {
    try {
      if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
        window.ReactNativeWebView.postMessage(JSON.stringify(obj));
      }
    } catch (e) {}
  }
  function showError(msg) {
    elErr.textContent = msg;
    elErr.classList.add('show');
    postToHost({ type: 'error', message: msg });
  }

  // ---- Own clock (anchor + elapsed) -----------------------------------------
  var anchor = { seconds: null, liveSeconds: null, at: 0, speed: 1, isPlaying: true };
  var haveData = false;
  var lastUpdate = 0;
  var streamReady = false;

  function now() {
    return (window.performance && performance.now) ? performance.now() : Date.now();
  }
  function targetSeconds() {
    var seconds = IS_LIVE && anchor.liveSeconds != null ? anchor.liveSeconds : anchor.seconds;
    if (seconds == null) return null;
    if (!anchor.isPlaying) return seconds;
    return seconds + ((now() - anchor.at) / 1000) * anchor.speed;
  }

  function pad(n, w) { n = Math.floor(Math.abs(n)).toString(); while (n.length < (w || 2)) { n = '0' + n; } return n; }
  function fmt(total) {
    if (total == null || isNaN(total)) return { hms: '--:--:--', ms: '---' };
    var neg = total < 0, a = Math.abs(total);
    return {
      hms: (neg ? '-' : '') + pad(a / 3600) + ':' + pad((a % 3600) / 60) + ':' + pad(a % 60),
      ms: pad((a - Math.floor(a)) * 1000, 3),
    };
  }
  function setStatus(isPlaying, connected) {
    elStatusDot.className = 'dot' + (!connected ? '' : (isPlaying ? ' live' : ' paused'));
    elStatusText.textContent = !connected ? 'Waiting' : (isPlaying ? 'Playing' : 'Paused');
  }

  // ---- dash.js --------------------------------------------------------------
  var player = null;
  var controller = new SyncController(CONTROLLER_OPTIONS);
  var seekCooldownUntil = 0;
  var lastTelemetryAt = 0;

  // Emit a compact sync-telemetry record to the host (schema mirrors the native
  // `SYNCTEL` line so tools/sync-dashboard can parse it unchanged). `src:'web'`
  // tells the dashboard this sample comes from the web player, not the native
  // controller. Throttled to keep the message rate low.
  function emitTelemetry(res, playerTime, tvTime) {
    if (!TELEMETRY) return;
    var t = Date.now();
    if (t - lastTelemetryAt < TELEMETRY_INTERVAL_MS) return;
    lastTelemetryAt = t;
    var status = res.action === 'seek'
      ? 'seeking'
      : (controller.mode === 'correcting' ? 'adjusting' : 'locked');
    var appliedRate = res.action === 'rate' ? res.rate : controller.currentRate;
    postToHost({
      type: 'synctel',
      payload: {
        v: 1,
        t: t,
        k: MODE,
        st: status,
        dr: Math.round(res.drift * 1000),
        fd: Math.round(res.filteredDrift * 1000),
        tv: Number(tvTime.toFixed(3)),
        pl: Number(playerTime.toFixed(3)),
        rt: Number(appliedRate.toFixed(3)),
        act: res.action,
        spd: anchor.speed,
        state: haveData ? 'synchronized' : null,
        src: 'web',
      },
    });
  }

  function selectTrack() {
    if (!player) return;
    var kind = MODE === 'video' ? 'video' : 'audio';
    var tracks = [];
    try { tracks = player.getTracksFor(kind) || []; } catch (e) { return; }
    if (!tracks.length) return;
    var chosen = null;
    if (TRACK_ISO) {
      for (var i = 0; i < tracks.length; i++) {
        if (tracks[i].lang && tracks[i].lang.toLowerCase() === TRACK_ISO.toLowerCase()) {
          // Prefer a role match when several tracks share the language.
          if (!chosen) chosen = tracks[i];
          var roles = tracks[i].roles || [];
          if (TRACK_ROLE && roles.indexOf(TRACK_ROLE) !== -1) { chosen = tracks[i]; break; }
        }
      }
    }
    if (!chosen && TRACK_INDEX >= 0 && TRACK_INDEX < tracks.length) {
      chosen = tracks[TRACK_INDEX];
    }
    if (chosen) {
      try { player.setCurrentTrack(chosen); } catch (e) {}
    }
  }

  function initPlayer() {
    if (!MPD_URL) { showError('Missing MPD URL'); return; }
    try {
      player = dashjs.MediaPlayer().create();
      player.updateSettings({ streaming: { buffer: { fastSwitchEnabled: true } } });
      player.initialize(media, MPD_URL, true);
      player.on(dashjs.MediaPlayer.events.ERROR, function (e) {
        var msg = (e && e.error && (e.error.message || e.error)) || 'DASH error';
        showError('' + msg);
      });
      player.on(dashjs.MediaPlayer.events.PLAYBACK_ERROR, function (e) {
        showError('Playback error');
      });
      player.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, function () {
        streamReady = true;
        selectTrack();
        postToHost({ type: 'ready', mode: MODE });
        // If a position was already fed before the stream was ready, seek now.
        var tgt = targetSeconds();
        if (tgt != null && !IS_LIVE) { safeSeek(tgt); }
      });
    } catch (e) {
      showError('Player init error: ' + (e && e.message));
    }
  }

  function playerCurrentTime() {
    try {
      if (IS_LIVE && player && typeof player.timeAsUTC === 'function') return player.timeAsUTC();
      return player ? player.time() : media.currentTime;
    }
    catch (e) { return media.currentTime; }
  }
  function safeSeek(sec) {
    if (!player || sec == null || !isFinite(sec) || sec < 0) return;
    try { player.seek(sec); seekCooldownUntil = now() + 1500; }
    catch (e) { try { media.currentTime = sec; } catch (e2) {} }
  }

  // Correction loop: compare player time to the TV target and act.
  function correct() {
    if (!streamReady || !haveData || anchor.seconds == null) return;
    var tgt = targetSeconds();
    if (tgt == null) return;

    // Reconcile play/pause with the TV.
    if (anchor.isPlaying && media.paused) { media.play().catch(function () {}); }
    else if (!anchor.isPlaying && !media.paused) { media.pause(); }
    if (!anchor.isPlaying) return;

    if (now() < seekCooldownUntil) return;

    var playerTime = playerCurrentTime();
    var res = controller.update({
      playerTime: playerTime,
      tvTime: tgt,
      seekThresholdS: IS_LIVE ? 5 : 2,
    });
    emitTelemetry(res, playerTime, tgt);
    if (res.action === 'seek') {
      controller.reset();
      var seekBase = IS_LIVE ? player.time() - res.drift : tgt;
      safeSeek(seekBase + SEEK_LEAD_S);
      media.playbackRate = 1.0;
    } else if (res.action === 'rate') {
      try { media.playbackRate = res.rate; } catch (e) {}
    }
  }

  // ---- Sync intake ----------------------------------------------------------
  function handleSync(payload) {
    var data = payload;
    if (typeof data === 'string') { try { data = JSON.parse(data); } catch (e) { return; } }
    if (!data || typeof data !== 'object') return;
    if (data.type === 'init') { return; }

    var seconds = (data.positionSeconds != null) ? data.positionSeconds
                : (data.positionMillis != null ? data.positionMillis / 1000 : null);
    if (seconds == null) return;

    haveData = true;
    lastUpdate = Date.now();
    if (elHint.style.display !== 'none') { elHint.style.display = 'none'; }

    var speed = (data.speed != null) ? data.speed : 1;
    var isPlaying = data.isPlaying !== false;
    // Latency compensation: the fed position was valid at `generatedAt` (device
    // wall clock). The WebView shares that device clock, so the transport
    // latency until we anchor here is `Date.now() - generatedAt`. Advance the
    // anchor by that staleness so we lock to where the TV IS now, not where it
    // was when the host sampled it; otherwise the web player trails the TV by
    // the feed latency (~100 ms), which the local drift metric cannot see
    // because it measures against this already-offset target.
    var staleMs = (typeof data.generatedAt === 'number') ? (Date.now() - data.generatedAt) : 0;
    if (!isFinite(staleMs) || staleMs < 0 || staleMs > 2000) staleMs = 0;
    var advanceS = isPlaying ? (staleMs / 1000) * speed : 0;

    anchor.seconds = seconds + advanceS;
    anchor.liveSeconds = data.exoPlayerPositionSeconds != null
      ? data.exoPlayerPositionSeconds + advanceS
      : null;
    anchor.at = now();
    anchor.speed = speed;
    anchor.isPlaying = isPlaying;
    if (data.trackName && elTrackName) { elTrackName.textContent = data.trackName; }
    setStatus(anchor.isPlaying, true);
  }

  window.__hbbtvSync = handleSync;
  window.addEventListener('message', function (ev) {
    var d = ev && ev.data;
    if (d == null) return;
    if (typeof d === 'string' && d.indexOf('positionSeconds') === -1 && d.indexOf('"type"') === -1) return;
    handleSync(d);
  });
  document.addEventListener('message', function (ev) { handleSync(ev && ev.data); });

  // ---- Render + correction ticks -------------------------------------------
  function tick() {
    var s = targetSeconds();
    if (s != null && haveData) {
      var tc = fmt(s);
      elTimecode.innerHTML = tc.hms + '<span class="ms">.' + tc.ms + '</span>';
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  setInterval(correct, CORRECTION_INTERVAL_MS);

  // Signal loss: back to waiting after 5 s without corrections.
  setInterval(function () {
    if (haveData && Date.now() - lastUpdate > 5000) {
      haveData = false;
      anchor.seconds = null;
      setStatus(false, false);
      if (elHint) { elHint.style.display = ''; }
    }
  }, 1000);

  initPlayer();
})();
</script>
</body>
</html>
