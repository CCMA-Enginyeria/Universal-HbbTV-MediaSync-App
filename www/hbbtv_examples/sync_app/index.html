<!DOCTYPE html>
<html lang="ca" style="height:100%;margin:0;padding:0;background:#05070d;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sync App · Timecode Demo</title>
<style>
  html,body{height:100%;margin:0;padding:0;overflow:hidden;background:#05070d;color:#e8edff;
    font-family:'Segoe UI',Roboto,system-ui,sans-serif;-webkit-user-select:none;user-select:none;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;box-sizing:border-box;}
  .badge{position:fixed;top:16px;left:16px;display:flex;align-items:center;gap:8px;
    font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:#7f8db3;}
  .dot{width:10px;height:10px;border-radius:50%;background:#f0803c;box-shadow:0 0 10px #f0803c;
    transition:background .2s,box-shadow .2s;}
  .dot.live{background:#39d98a;box-shadow:0 0 12px #39d98a;}
  .dot.paused{background:#f2c94c;box-shadow:0 0 12px #f2c94c;}
  .label{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#7f8db3;margin-bottom:12px;}
  #timecode{font-family:'SFMono-Regular',Consolas,'Roboto Mono',monospace;font-weight:700;
    font-size:clamp(32px,14vw,120px);line-height:1;letter-spacing:2px;
    color:#e8edff;text-shadow:0 0 30px rgba(80,120,255,.35);font-variant-numeric:tabular-nums;}
  #timecode .ms{color:#5f7bd6;font-size:.42em;vertical-align:baseline;}
  #meta{margin-top:22px;display:flex;gap:28px;flex-wrap:wrap;justify-content:center;
    font-size:15px;color:#9aa6c8;}
  #meta b{color:#e8edff;font-weight:600;}
  #waiting{margin-top:20px;font-size:16px;color:#7f8db3;}
  .pill{padding:4px 12px;border-radius:999px;background:rgba(120,140,220,.12);
    border:1px solid rgba(120,140,220,.25);}
  #content{position:fixed;bottom:16px;left:16px;right:16px;font-size:12px;
    color:#647099;word-break:break-all;text-align:center;opacity:.75;}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  .pulsing{animation:pulse 1.4s ease-in-out infinite;}
</style>
</head>
<body>
<div class="badge"><span id="statusDot" class="dot"></span><span id="statusText">Esperant</span></div>

<div id="app">
  <div class="label">Timecode sincronitzat (PTS)</div>
  <div id="timecode">--:--:--<span class="ms">.---</span></div>
  <div id="meta">
    <div>Estat: <b id="playState">—</b></div>
    <div>Velocitat: <b id="speed">—</b></div>
    <div>Segons: <b id="seconds">—</b></div>
  </div>
  <div id="waiting" class="pulsing">Esperant sincronització des del televisor…</div>
</div>
<div id="content"></div>

<script>
(function(){
  var elTimecode=document.getElementById('timecode');
  var elPlayState=document.getElementById('playState');
  var elSpeed=document.getElementById('speed');
  var elSeconds=document.getElementById('seconds');
  var elWaiting=document.getElementById('waiting');
  var elStatusDot=document.getElementById('statusDot');
  var elStatusText=document.getElementById('statusText');
  var elContent=document.getElementById('content');

  var lastUpdate=0;
  var haveData=false;
  // Rellotge propi de la web: en comptes de dependre únicament dels missatges
  // rebuts (que arribarien a una freqüència molt alta), la web manté el seu
  // propi rellotge que avança sol i, quan arriba un missatge, en corregeix
  // l'ancoratge. Així n'hi ha prou amb correccions periòdiques (~1/s).
  var anchor={seconds:null,at:0,speed:1,isPlaying:true};

  function pad(n,w){n=Math.floor(Math.abs(n)).toString();while(n.length<(w||2)){n='0'+n;}return n;}

  function formatTimecode(totalSeconds){
    if(totalSeconds==null||isNaN(totalSeconds)){return {hms:'--:--:--',ms:'---'};}
    var neg=totalSeconds<0;
    var abs=Math.abs(totalSeconds);
    var h=Math.floor(abs/3600);
    var m=Math.floor((abs%3600)/60);
    var s=Math.floor(abs%60);
    var ms=Math.floor((abs-Math.floor(abs))*1000);
    return {hms:(neg?'-':'')+pad(h)+':'+pad(m)+':'+pad(s),ms:pad(ms,3)};
  }

  function setStatus(isPlaying,connected){
    elStatusDot.className='dot'+(!connected?'':(isPlaying?' live':' paused'));
    elStatusText.textContent=!connected?'Esperant':(isPlaying?'Reproduint':'En pausa');
  }

  // Rep una actualització de posició/sincronització. `payload` pot ser objecte o JSON.
  function handleSync(payload){
    var data=payload;
    if(typeof data==='string'){
      try{data=JSON.parse(data);}catch(e){return;}
    }
    if(!data||typeof data!=='object'){return;}

    if(data.type==='init'){
      if(data.contentId){elContent.textContent='contentId: '+data.contentId;}
      return;
    }

    // Missatge de posició (per defecte).
    var seconds=(data.positionSeconds!=null)?data.positionSeconds
               :(data.positionMillis!=null?data.positionMillis/1000:null);
    if(seconds==null){return;}

    haveData=true;
    lastUpdate=Date.now();
    if(elWaiting.style.display!=='none'){elWaiting.style.display='none';}

    // Corregeix l'ancoratge del rellotge propi amb el valor rebut. El bucle
    // d'animació (tick) interpola i renderitza a cada frame a partir d'això.
    anchor.seconds=seconds;
    anchor.at=now();
    anchor.speed=(data.speed!=null)?data.speed:1;
    anchor.isPlaying=data.isPlaying!==false;

    elPlayState.textContent=anchor.isPlaying?'Reproduint':'Pausa';
    elSpeed.textContent=anchor.speed.toString()+'×';
    setStatus(anchor.isPlaying,true);
  }

  // Temps de referència monòton (ms).
  function now(){
    return (window.performance&&performance.now)?performance.now():Date.now();
  }

  // Posició actual segons el rellotge propi (ancoratge + temps transcorregut).
  function currentSeconds(){
    if(anchor.seconds==null){return null;}
    if(!anchor.isPlaying){return anchor.seconds;}
    var elapsed=(now()-anchor.at)/1000;
    return anchor.seconds+elapsed*anchor.speed;
  }

  // Bucle d'animació: renderitza el timecode a cada frame a partir del rellotge
  // propi, de manera que el crono avança suau encara que els missatges siguin
  // poc freqüents.
  function tick(){
    var s=currentSeconds();
    if(s!=null&&haveData){
      var tc=formatTimecode(s);
      elTimecode.innerHTML=tc.hms+'<span class="ms">.'+tc.ms+'</span>';
      elSeconds.textContent=s.toFixed(3)+' s';
    }
    requestAnimationFrame(tick);
  }

  // API principal: la app mòbil injecta window.__hbbtvSync(payload).
  window.__hbbtvSync=handleSync;

  // Fallback: alguns hosts (WebView / iframe) envien via postMessage.
  window.addEventListener('message',function(ev){
    var d=ev&&ev.data;
    if(d==null){return;}
    // Ignora missatges que no semblin del nostre protocol.
    if(typeof d==='string'){
      if(d.indexOf('positionSeconds')===-1&&d.indexOf('"type"')===-1){return;}
    }
    handleSync(d);
  });
  // React Native WebView (Android) pot enviar a document.
  document.addEventListener('message',function(ev){handleSync(ev&&ev.data);});

  // Si es perd el senyal (>5 s sense correccions), tornem a l'estat d'espera.
  // Amb el rellotge propi n'hi ha prou amb correccions periòdiques, però si
  // deixen d'arribar del tot considerem que s'ha perdut la sincronització.
  setInterval(function(){
    if(haveData&&Date.now()-lastUpdate>5000){
      haveData=false;
      anchor.seconds=null;
      setStatus(false,false);
      elPlayState.textContent='Sense senyal';
      elWaiting.style.display='';
      elWaiting.textContent='Esperant sincronització des del televisor…';
    }
  },500);

  setStatus(false,false);
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
