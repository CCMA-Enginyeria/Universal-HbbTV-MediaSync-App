name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Decode Keystore
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Strip any whitespace / CR / LF the secret may contain (e.g. base64
          # generated on Windows with CRLF, or pasted with line wraps). Leaving
          # them in corrupts the decoded keystore, which later surfaces as the
          # misleading "keystore password was incorrect" Gradle error.
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > android/app/release.keystore

      - name: Verify Keystore
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          KS=android/app/release.keystore
          # sha256 is safe to print and lets us confirm the secret matches the
          # keystore used locally without exposing anything sensitive.
          echo "keystore sha256=$(sha256sum "$KS" | awk '{print $1}')"

          # Fail fast (before Gradle) if the store password does not match the
          # keystore in the secret. This is the exact failure that previously
          # surfaced as a confusing "keystore password was incorrect" deep in
          # Gradle's PackageAndroidArtifact task.
          if ! keytool -list -keystore "$KS" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::The ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS secrets do not match the keystore in ANDROID_KEYSTORE_BASE64. Regenerate the base64 from the correct release.keystore and update the secrets."
            exit 1
          fi
          echo "Keystore verified: store password OK and alias present."

      - name: Build Release APK + AAB
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_FILE: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Release APK
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name || 'manual' }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload Release AAB
        if: ${{ github.event_name == 'push' || github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle-${{ github.ref_name || 'manual' }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-manual
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK + AAB to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
